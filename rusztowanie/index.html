<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porównanie Rusztowań 6m - Fix Mobilny</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; margin: 0; padding: 15px; }
        h2 { font-size: 16px; text-align: center; color: #333; margin-bottom: 20px; }
        /* Kontener z wymuszoną wysokością i pozycjonowaniem */
       .chart-container {
            position: relative;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 10px;
            width: 100%;
            height: 380px; /* Sztywna wysokość dla mobilnych */
            margin: 0 auto;
            box-sizing: border-box;
        }
       .info { font-size: 11px; color: #777; text-align: center; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

    <h2>ANALIZA TECHNICZNA RUSZTOWAŃ (6M)</h2>
    
    <div class="chart-container">
        <canvas id="scaffoldRadarChart" width="400" height="400"></canvas>
    </div>

    <div class="info">
        <strong>Legenda:</strong> Wykres radarowy 1-10.<br>
        *Cena: 10 = najniższy koszt. Sztywność: 10 = rury 50mm/max stabilność.
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const ctx = document.getElementById('scaffoldRadarChart');
            
            if (!ctx) return;

            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels:,
                    datasets:,
                            borderColor: '#e11d48',
                            backgroundColor: 'rgba(225, 29, 72, 0.1)',
                            borderWidth: 2
                        },
                        {
                            label: 'Altrex 3400',
                            data: [7, 9, 10, 7],
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37, 99, 235, 0.1)',
                            borderWidth: 2
                        },
                        {
                            label: 'Drabex RA 600',
                            data: [8, 7, 6, 8],
                            borderColor: '#16a34a',
                            backgroundColor: 'rgba(22, 163, 74, 0.1)',
                            borderWidth: 2
                        },
                        {
                            label: 'Krause Stabilo 10',
                            data: [5, 6, 3, 2],
                            borderColor: '#ca8a04',
                            backgroundColor: 'rgba(202, 138, 4, 0.1)',
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // Kluczowe dla poprawnego wypełnienia kontenera
                    aspectRatio: 1, // Radar najlepiej wygląda jako kwadrat
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { boxWidth: 12, font: { size: 10 } }
                        }
                    },
                    scales: {
                        r: {
                            min: 0,
                            max: 10,
                            ticks: { display: false, stepSize: 2 },
                            pointLabels: { 
                                font: { size: 11, weight: 'bold' },
                                color: '#444'
                            }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
